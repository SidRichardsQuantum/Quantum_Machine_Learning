name: Pages

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - USAGE.md
      - THEORY.md
      - CHANGELOG.md
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material pymdown-extensions

      - name: Stage documentation
        run: |
          mkdir -p site_docs/qml
          cp README.md site_docs/index.md
          cp USAGE.md site_docs/usage.md
          cp THEORY.md site_docs/theory.md
          cp CHANGELOG.md site_docs/changelog.md
          cp docs/qml/*.md site_docs/qml/

      - name: Configure documentation site
        run: |
          cat > mkdocs.yml <<'YAML'
          site_name: Quantum Machine Learning
          site_description: Modular PennyLane-based quantum machine learning workflows.
          site_url: https://SidRichardsQuantum.github.io/Quantum_Machine_Learning/
          repo_url: https://github.com/SidRichardsQuantum/Quantum_Machine_Learning
          repo_name: SidRichardsQuantum/Quantum_Machine_Learning
          docs_dir: site_docs
          site_dir: _site

          theme:
            name: material
            language: en
            palette:
              - scheme: default
                primary: indigo
                accent: cyan
                toggle:
                  icon: material/weather-night
                  name: Switch to dark mode
              - scheme: slate
                primary: indigo
                accent: cyan
                toggle:
                  icon: material/weather-sunny
                  name: Switch to light mode
            features:
              - navigation.instant
              - navigation.sections
              - navigation.top
              - content.code.copy
              - search.highlight

          markdown_extensions:
            - admonition
            - attr_list
            - md_in_html
            - pymdownx.arithmatex:
                generic: true
            - pymdownx.details
            - pymdownx.highlight:
                anchor_linenums: true
            - pymdownx.inlinehilite
            - pymdownx.superfences
            - toc:
                permalink: true

          extra_javascript:
            - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

          nav:
            - Overview: index.md
            - Usage: usage.md
            - Theory: theory.md
            - Algorithms:
                - Variational Quantum Classifier: qml/variational_quantum_classifier.md
                - Variational Regression: qml/variational_regression.md
                - Quantum Kernels: qml/quantum_kernels.md
                - Trainable Metric Learning: qml/metric_learning.md
                - Quantum CNN: qml/qcnn.md
                - Quantum Autoencoder: qml/autoencoder.md
                - Classical Baselines: qml/classical_baselines.md
                - Benchmarks: qml/benchmarks.md
            - Changelog: changelog.md
          YAML

      - name: Build documentation site
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
